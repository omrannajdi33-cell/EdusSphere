services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: edusphere-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - edusphere

  nginx:
    image: nginx:1.27-alpine
    container_name: edusphere-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - edusphere

  mysql:
    image: mysql:8.4
    container_name: edusphere-mysql
    restart: unless-stopped
    command: --innodb-buffer-pool-size=256M --skip-log-bin
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-edusphere}
      MYSQL_USER: ${DB_USERNAME:-edusphere}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - edusphere

  redis:
    image: redis:7-alpine
    container_name: edusphere-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks:
      - edusphere

  phpmyadmin:
    profiles: ["tools"]
    image: phpmyadmin:5
    container_name: edusphere-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-edusphere}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - edusphere

  node:
    profiles: ["dev"]
    image: node:22-alpine
    container_name: edusphere-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - edusphere

  scheduler:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: edusphere-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan schedule:work
    depends_on:
      - app
      - mysql
    networks:
      - edusphere

networks:
  edusphere:
    driver: bridge

volumes:
  mysql_data:
  node_modules_data:
